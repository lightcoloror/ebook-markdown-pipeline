services:
  ebook-material-tools:
    build:
      context: .
    image: ebook-material-tools:local
    env_file:
      - ./config/http.env
    ports:
      - "${EBOOK_CONVERTER_HTTP_PORT:?Load config/http.env}:${EBOOK_CONVERTER_HTTP_PORT:?Load config/http.env}"
    environment:
      EBOOK_CONVERTER_API_TOKEN: "replace-with-a-local-token"
    volumes:
      - ./data/input:/data/input
      - ./data/output:/data/output
      - ./data/cache:/data/cache
    command:
      - python
      - -m
      - ebook_markdown_pipeline.ebook_converter_http
      - --host
      - 0.0.0.0
